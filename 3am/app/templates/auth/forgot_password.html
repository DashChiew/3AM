{% extends "base.html" %}
{% block title %}Forgot Password — 3am{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 80px auto;">

  <div style="text-align: center; margin-bottom: 32px;">
    <div style="font-size: 3rem;">🔑</div>
    <h1 style="font-size: 2.5rem; font-weight: 900; color: var(--purple); letter-spacing: -2px;">Reset Password</h1>
    <p style="color: var(--muted); font-size: 0.9rem;">Enter your email to receive a 6-digit code.</p>
  </div>

  <div class="card" style="padding: 50px;">
    <form method="POST">
      <div style="margin-bottom: 35px;">
        <label style="display:block; font-size:1rem; color:var(--muted); margin-bottom:8px;">
          Email Address
        </label>
        <input type="email" name="email"
          style="width:100%; padding:12px 16px; border-radius:10px; background:var(--bg2); border:1px solid var(--border); color:var(--text); font-size:1rem;"
          placeholder="your.email@example.com" required autofocus>
      </div>

      <button type="submit" class="btn btn-primary"
        style="width:100%; justify-content:center; padding:14px; font-size: 1.05rem; font-weight: 600;">
        Send Verification Code
      </button>
    </form>

    <p style="text-align:center; margin-top:24px; font-size:0.85rem; color:var(--muted);">
      Remembered? <a href="/login" style="color:var(--purple);">Back to login →</a>
    </p>
  </div>

</div>
{% endblock %}
