{% extends "base.html" %}
{% block title %}Log In — 3am{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 80px auto;">

  <div style="text-align: center; margin-bottom: 32px;">
    <div style="font-size: 3rem;">🌙</div>
    <h1 style="font-size: 2.5rem; font-weight: 900; color: var(--purple); letter-spacing: -2px;">3AM</h1>
    <p style="color: var(--muted); font-size: 0.9rem;">You are never alone at 3am.</p>
  </div>

  <div class="card" style="padding: 50px;">
    <div class="card-title">Welcome back</div>
    <form method="POST">
      <div style="margin-bottom: 35px;">
        <label style="display:block; font-size:1rem; color:var(--muted); margin-bottom:8px;">
          Username or Email
        </label>
        <input type="text" name="identifier"
          style="width:100%; padding:12px 16px; border-radius:10px; background:var(--bg2); border:1px solid var(--border); color:var(--text); font-size:1rem;"
          placeholder="your username or email" required autofocus>
      </div>

      <div style="margin-bottom: 20px;">
        <label style="display:block; font-size:1rem; color:var(--muted); margin-bottom:8px;">
          Password
        </label>
        <input type="password" name="password"
          style="width:100%; padding:12px 16px; border-radius:10px; background:var(--bg2); border:1px solid var(--border); color:var(--text); font-size:1rem;"
          placeholder="your password" required>
        <div style="text-align: right; margin-top: 8px;">
          <a href="/forgot-password" style="color: var(--purple); font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
        </div>
      </div>

      <div
        style="margin-bottom: 24px; display: flex; align-items: center; gap: 12px; background: var(--bg2); padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);">
        <label class="switch" for="anon-toggle"
          style="position: relative; display: inline-block; width: 38px; height: 20px; flex-shrink: 0;">
          <input type="checkbox" id="anon-toggle" name="anonymous_mode" style="opacity: 0; width: 0; height: 0;">
          <span class="slider"
            style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; transition: .3s; border-radius: 20px; border: 1px solid var(--border);"></span>
        </label>
        <span style="font-size: 0.9rem; color: var(--muted);">Enter in Anonymous Mode 🌙</span>
      </div>

      <style>
        .slider {
          background-color: var(--card);
        }

        .switch input:checked+.slider {
          background-color: var(--purple2);
          border-color: var(--purple2);
        }

        .slider:before {
          position: absolute;
          content: "";
          height: 14px;
          width: 14px;
          left: 2px;
          bottom: 2px;
          background-color: white;
          transition: .3s;
          border-radius: 50%;
        }

        .switch input:checked+.slider:before {
          transform: translateX(18px);
        }
      </style>

      <button type="submit" id="submitBtn" class="btn btn-primary"
        style="width:100%; justify-content:center; padding:14px; font-size: 1.05rem; font-weight: 600;">
        Sign In
      </button>
    </form>

    <script>
      const anonToggle = document.getElementById('anon-toggle');
      const submitBtn = document.getElementById('submitBtn');
      
      anonToggle.addEventListener('change', () => {
        if (anonToggle.checked) {
          submitBtn.style.background = 'var(--purple)';
        } else {
          submitBtn.style.background = 'var(--purple2)';
        }
      });
    </script>

    <p style="text-align:center; margin-top:16px; font-size:0.85rem; color:var(--muted);">
      New here? <a href="/register" style="color:var(--purple);">Create an account →</a>
    </p>
  </div>

</div>
{% endblock %}
