{% extends "base.html" %}
{% block title %}New Password — 3am{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 80px auto;">

  <div style="text-align: center; margin-bottom: 32px;">
    <div style="font-size: 3rem;">🔒</div>
    <h1 style="font-size: 2.5rem; font-weight: 900; color: var(--purple); letter-spacing: -2px;">New Password</h1>
    <p style="color: var(--muted); font-size: 0.9rem;">Create a strong password to secure your account.</p>
  </div>

  <div class="card" style="padding: 50px;">
    <form method="POST">
      <div style="margin-bottom: 25px;">
        <label style="display:block; font-size:1rem; color:var(--muted); margin-bottom:8px;">
          New Password
        </label>
        <input type="password" name="password"
          style="width:100%; padding:12px 16px; border-radius:10px; background:var(--bg2); border:1px solid var(--border); color:var(--text); font-size:1rem;"
          placeholder="at least 8 characters" required autofocus minlength="8">
      </div>

      <div style="margin-bottom: 35px;">
        <label style="display:block; font-size:1rem; color:var(--muted); margin-bottom:8px;">
          Confirm New Password
        </label>
        <input type="password" name="confirm_password"
          style="width:100%; padding:12px 16px; border-radius:10px; background:var(--bg2); border:1px solid var(--border); color:var(--text); font-size:1rem;"
          placeholder="repeat new password" required>
      </div>

      <button type="submit" class="btn btn-primary"
        style="width:100%; justify-content:center; padding:14px; font-size: 1.05rem; font-weight: 600;">
        Reset Password
      </button>
    </form>
  </div>

</div>
{% endblock %}
